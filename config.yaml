# ============================================================
# ML Framework Comparison - 전역 설정
# ============================================================

# MLflow 서버 설정
mlflow:
  tracking_uri: "http://localhost:5001"
  experiment_name: "cifar100-framework-comparison"
  artifact_location: "./mlruns/artifacts"
  run_names:
    sklearn: 'sklearns_mlp'
    tensorflow: 'tensorflow_resnet'
    flax: 'flax_resnet'

# 데이터셋 설정
data:
  dataset: "cifar100"
  data_dir: "./data"
  val_split: 0.2
  random_seed: 42

# 학습 하이퍼파라미터 (세 프레임워크 공통)
train:
  epochs: 30
  batch_size: 128
  learning_rate: 0.001
  dropout_rate: 0.5
  l2_lambda: 0.0001
  optimizer: "adam"

# 모델 아키텍처 설정
model:
  model_type: "ResNet"
  flax_module: 'flax_resnet_model'
  tensorflow_module: 'tensorflow_resnet_model'
  sklearn_module: 'sklearns_mlp'

  input_shape: [32, 32, 3]
  num_classes: 100
  filters: [32, 64, 128]
  dense_units: [512, 256]

# 프레임워크별 설정
frameworks:
  sklearn:
    enabled: true
    solver: "adam"
    max_iter: 30
    early_stopping: true
    n_iter_no_change: 5
    tol: 0.0001

  tensorflow:
    enabled: true
    mixed_precision: false
    lr_scheduler: "none"

  flax:
    enabled: true
    use_jit: true
    xla_flags: "default"
    jax_backend: "gpu"        # jax.default_backend()로 자동 감지

# 로깅 설정
logging:
  save_artifacts: true
  artifact_dir: "./artifacts"
  top5: true
  track_gpu: true